[project]
name = "optimize-routing"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "loguru>=0.7",
    "ortools>=9.9",
    "numpy>=1.26",
    "pandas>=2.2",
    "matplotlib>=3.8",
    "notebook>=7.0",
    "sympy>=1.14.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "isort>=5.13"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["optimizer", "ortools_objects", "rl", "utils"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.isort]
profile = "black"
line_length = 100
